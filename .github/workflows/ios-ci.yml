name: iOS CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "codex/**"
      - "claude/**"

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Resolve simulator
        run: |
          SIMULATOR_ID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { print $2; exit }')
          if [ -z "$SIMULATOR_ID" ]; then
            echo "No available iPhone simulator found."
            xcrun simctl list devices available
            exit 1
          fi
          echo "IOS_SIMULATOR_DESTINATION=platform=iOS Simulator,id=${SIMULATOR_ID}" >> "$GITHUB_ENV"

      - name: Build
        run: |
          xcodebuild \
            -project MoonloomApp.xcodeproj \
            -scheme MoonloomApp \
            -destination "$IOS_SIMULATOR_DESTINATION" \
            build

      - name: Test
        run: |
          xcodebuild \
            -project MoonloomApp.xcodeproj \
            -scheme MoonloomApp \
            -destination "$IOS_SIMULATOR_DESTINATION" \
            test
