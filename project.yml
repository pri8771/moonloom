# XcodeGen project specification — fallback / regeneration source for
# MoonloomApp.xcodeproj. The checked-in .xcodeproj is authoritative; if it ever
# drifts or needs regenerating, run `xcodegen generate` with this file.
#
# Install XcodeGen: `brew install xcodegen`
name: MoonloomApp
options:
  bundleIdPrefix: com.moonloom
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  MoonloomApp:
    type: application
    platform: iOS
    sources:
      - path: MoonloomApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moonloom.app
        GENERATE_INFOPLIST_FILE: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
  MoonloomTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MoonloomTests
    dependencies:
      - target: MoonloomApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moonloom.app.tests
        GENERATE_INFOPLIST_FILE: "YES"
schemes:
  MoonloomApp:
    build:
      targets:
        MoonloomApp: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MoonloomTests
